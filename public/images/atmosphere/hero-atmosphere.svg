<?xml version="1.0" encoding="UTF-8"?>
<!--
  ATMOSPHERE PLACEHOLDER — not a real project photo.
  A warm, minimal desert-modern composition (light raking across a plaster
  wall and a sunlit aperture) used purely as mood/texture behind the hero.

  Replace with a high-quality warm desert-modern INTERIOR photograph from
  Unsplash (stored locally in this folder), or swap for a looping video —
  the hero is built so the background can change with zero layout impact.
  External image hosts were not reachable in the build sandbox, so this
  hand-built SVG stands in and matches the brand palette exactly.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Warm, minimal architectural atmosphere">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E3DC"/>
      <stop offset="0.55" stop-color="#FBF7F2"/>
      <stop offset="1" stop-color="#F1E6DD"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="0.15">
      <stop offset="0" stop-color="#E7D8CE"/>
      <stop offset="0.5" stop-color="#DCCabd"/>
      <stop offset="1" stop-color="#C9B7A8"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C7B6A6"/>
      <stop offset="1" stop-color="#AD9A89"/>
    </linearGradient>
    <linearGradient id="lightShaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBF7F2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#F4E3DC" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#FBF7F2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FBF7F2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241E1A" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#241E1A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1600" height="1000" fill="url(#sky)"/>

  <!-- back wall plane -->
  <rect x="0" y="0" width="1600" height="720" fill="url(#wall)"/>

  <!-- floor plane -->
  <rect x="0" y="720" width="1600" height="280" fill="url(#floor)"/>
  <rect x="0" y="718" width="1600" height="3" fill="#241E1A" opacity="0.06"/>

  <!-- tall sunlit aperture (doorway / window of light) -->
  <rect x="980" y="150" width="240" height="570" fill="url(#lightShaft)"/>
  <rect x="980" y="150" width="3" height="570" fill="#FBF7F2" opacity="0.6"/>
  <rect x="1217" y="150" width="3" height="570" fill="#241E1A" opacity="0.05"/>

  <!-- light cast on the floor from the aperture -->
  <polygon points="980,720 1220,720 1320,840 900,840" fill="#FBF7F2" opacity="0.35"/>

  <!-- a single quiet vertical reveal on the left (architectural rhythm) -->
  <rect x="250" y="0" width="2" height="720" fill="#241E1A" opacity="0.05"/>

  <!-- soft raking shadow across the wall -->
  <rect x="0" y="0" width="760" height="720" fill="url(#shadow)"/>

  <!-- ambient warm glow near the aperture -->
  <rect width="1600" height="1000" fill="url(#glow)"/>
</svg>
